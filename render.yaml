services:
  # Service 1 — Backend (free web service)
  - type: web
    name: agenticai-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/index.js
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000

  # Service 2 — Frontend (free web service)
  - type: web
    name: agenticai-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://agenticai-backend-xao9.onrender.com

  # Service 4 — Redis
  - type: redis
    name: agenticai-redis
    plan: free # Note: 25MB limit on free tier
    ipAllowList: [] # Allow all internal traffic


